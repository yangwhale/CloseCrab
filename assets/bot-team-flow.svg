<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#58a6ff"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3fb950"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#e3b341"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#d2a8ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="720" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Task Dispatch &amp; Collaboration Flow</text>

  <!-- Lifeline headers -->
  <rect x="40" y="50" width="100" height="32" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="90" y="71" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">User</text>

  <rect x="230" y="50" width="140" height="32" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.2"/>
  <text x="300" y="71" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="600">Leader (Jarvis)</text>

  <rect x="490" y="50" width="130" height="32" rx="8" fill="#161b22" stroke="#10b981" stroke-width="1.2"/>
  <text x="555" y="71" text-anchor="middle" fill="#7ee787" font-size="12" font-weight="600">Tommy (TPU)</text>

  <rect x="720" y="50" width="130" height="32" rx="8" fill="#161b22" stroke="#f87171" stroke-width="1.2"/>
  <text x="785" y="71" text-anchor="middle" fill="#ffa198" font-size="12" font-weight="600">Bunny (B200)</text>

  <!-- Lifelines -->
  <line x1="90" y1="82" x2="90" y2="700" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="300" y1="82" x2="300" y2="700" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="555" y1="82" x2="555" y2="700" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="785" y1="82" x2="785" y2="700" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User → Leader -->
  <line x1="95" y1="120" x2="292" y2="120" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="110" y="100" width="170" height="16" rx="3" fill="#161b22" opacity="0.9"/>
  <text x="195" y="112" text-anchor="middle" fill="#c9d1d9" font-size="10">"Train Llama 4 + benchmark"</text>

  <!-- Step 2: Leader → Tommy (Inbox) -->
  <line x1="308" y1="165" x2="547" y2="165" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <rect x="350" y="147" width="160" height="14" rx="3" fill="#21262d"/>
  <text x="430" y="158" text-anchor="middle" fill="#d2a8ff" font-size="10">[Inbox] MaxText training</text>

  <!-- Step 3: Leader → Bunny (Inbox) -->
  <line x1="308" y1="205" x2="777" y2="205" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <rect x="460" y="187" width="190" height="14" rx="3" fill="#21262d"/>
  <text x="555" y="198" text-anchor="middle" fill="#d2a8ff" font-size="10">[Inbox] vLLM inference benchmark</text>

  <!-- Activation boxes (running) -->
  <rect x="548" y="225" width="14" height="140" rx="3" fill="#059669" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <rect x="778" y="225" width="14" height="180" rx="3" fill="#dc2626" opacity="0.3" stroke="#f87171" stroke-width="1"/>

  <!-- Labels for running -->
  <text x="575" y="280" fill="#3fb950" font-size="10" font-style="italic">TPU training...</text>
  <text x="575" y="300" fill="#6e7681" font-size="9">JAX + MaxText</text>
  <text x="575" y="320" fill="#6e7681" font-size="9">on v6e-8 chips</text>

  <text x="805" y="290" fill="#ffa198" font-size="10" font-style="italic">B200 inference...</text>
  <text x="805" y="310" fill="#6e7681" font-size="9">vLLM serving</text>
  <text x="805" y="330" fill="#6e7681" font-size="9">benchmark suite</text>

  <!-- GCS write indicators -->
  <rect x="620" y="340" width="90" height="18" rx="4" fill="#0d1117" stroke="#e3b341" stroke-width="0.8"/>
  <text x="665" y="353" text-anchor="middle" fill="#e3b341" font-size="9">write → GCS</text>
  <rect x="805" y="375" width="65" height="18" rx="4" fill="#0d1117" stroke="#e3b341" stroke-width="0.8"/>
  <text x="837" y="388" text-anchor="middle" fill="#e3b341" font-size="9">→ GCS</text>

  <!-- Step 4: Tommy → Leader (Inbox result) -->
  <line x1="547" y1="400" x2="308" y2="400" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <rect x="330" y="382" width="200" height="14" rx="3" fill="#21262d"/>
  <text x="430" y="393" text-anchor="middle" fill="#7ee787" font-size="10">[Inbox] Done! loss=0.82 → /gcs/...</text>

  <!-- Step 5: Bunny → Leader (Inbox result) -->
  <line x1="777" y1="450" x2="308" y2="450" stroke="#ffa198" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <rect x="400" y="432" width="260" height="14" rx="3" fill="#21262d"/>
  <text x="530" y="443" text-anchor="middle" fill="#ffa198" font-size="10">[Inbox] Done! 1200 tok/s → /gcs/bench/</text>

  <!-- Leader processing -->
  <rect x="293" y="475" width="14" height="70" rx="3" fill="#7c3aed" opacity="0.3" stroke="#a855f7" stroke-width="1"/>
  <text x="320" y="500" fill="#d2a8ff" font-size="10" font-style="italic">Read GCS results</text>
  <text x="320" y="518" fill="#d2a8ff" font-size="10" font-style="italic">Generate report</text>
  <text x="320" y="536" fill="#6e7681" font-size="9">→ cc-pages/</text>

  <!-- Step 6: Leader → User (report) -->
  <line x1="292" y1="570" x2="95" y2="570" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="105" y="552" width="175" height="14" rx="3" fill="#21262d"/>
  <text x="192" y="563" text-anchor="middle" fill="#c9d1d9" font-size="10">Report: cc.example.com/...</text>

  <!-- Timeline annotation -->
  <rect x="30" y="610" width="820" height="90" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="635" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="500">Key: Communication Channels</text>

  <!-- Legend items -->
  <line x1="80" y1="660" x2="140" y2="660" stroke="#a855f7" stroke-width="2"/>
  <text x="150" y="664" fill="#d2a8ff" font-size="11">Firestore Inbox (ms latency)</text>

  <line x1="380" y1="660" x2="440" y2="660" stroke="#e3b341" stroke-width="2"/>
  <text x="450" y="664" fill="#e3b341" font-size="11">GCS shared data (TB scale)</text>

  <line x1="650" y1="660" x2="710" y2="660" stroke="#3fb950" stroke-width="2"/>
  <text x="720" y="664" fill="#7ee787" font-size="11">Result callback</text>

  <text x="440" y="688" text-anchor="middle" fill="#484f58" font-size="10">User can disconnect at any time. Bots execute autonomously and notify on completion.</text>
</svg>
