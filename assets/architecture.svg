<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Google Sans', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5F6368"/>
    </marker>
    <marker id="arrow-voice" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EA4335"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#F8F9FA"/>

  <text x="500" y="36" text-anchor="middle" fill="#202124" font-size="20" font-weight="600">CloseCrab Architecture</text>
  <text x="500" y="56" text-anchor="middle" fill="#5F6368" font-size="12">Channel → BotCore → Worker (hot-swappable) → Agent CLI</text>

  <!-- ============== ROW 1: USER & CHANNELS ============== -->
  <g transform="translate(60, 90)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">USER · PLATFORMS</text>
    <rect x="0" y="0" width="700" height="80" rx="8" fill="#FFFFFF" stroke="#DADCE0" filter="url(#card-shadow)"/>

    <g transform="translate(20, 18)">
      <rect width="140" height="44" rx="22" fill="#E8F0FE" stroke="#1A73E8"/>
      <text x="70" y="28" text-anchor="middle" fill="#1A73E8" font-size="13" font-weight="600">Discord</text>
    </g>
    <g transform="translate(180, 18)">
      <rect width="140" height="44" rx="22" fill="#E6F4EA" stroke="#188038"/>
      <text x="70" y="28" text-anchor="middle" fill="#188038" font-size="13" font-weight="600">飞书 / Lark</text>
    </g>
    <g transform="translate(340, 18)">
      <rect width="140" height="44" rx="22" fill="#FEF7E0" stroke="#B06000"/>
      <text x="70" y="28" text-anchor="middle" fill="#B06000" font-size="13" font-weight="600">钉钉</text>
    </g>
    <g transform="translate(500, 18)">
      <rect width="180" height="44" rx="8" fill="#FCE8E6" stroke="#C5221F" stroke-dasharray="4,2"/>
      <text x="90" y="20" text-anchor="middle" fill="#C5221F" font-size="11" font-weight="600">🎙️ /voice</text>
      <text x="90" y="34" text-anchor="middle" fill="#C5221F" font-size="9">LiveKit browser call</text>
    </g>
  </g>

  <!-- Side panel: Shared services -->
  <g transform="translate(800, 90)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">SHARED SERVICES</text>
    <rect x="0" y="0" width="140" height="500" rx="8" fill="#FFFFFF" stroke="#DADCE0" filter="url(#card-shadow)"/>

    <g transform="translate(12, 16)">
      <rect width="116" height="56" rx="6" fill="#FEF7E0"/>
      <text x="58" y="22" text-anchor="middle" fill="#B06000" font-size="11" font-weight="600">Firestore</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">config · logs</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">inbox · registry</text>
    </g>

    <g transform="translate(12, 84)">
      <rect width="116" height="56" rx="6" fill="#E8F0FE"/>
      <text x="58" y="22" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="600">GCS Bucket</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">CC Pages HTML</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">shared memory</text>
    </g>

    <g transform="translate(12, 152)">
      <rect width="116" height="56" rx="6" fill="#E6F4EA"/>
      <text x="58" y="22" text-anchor="middle" fill="#188038" font-size="11" font-weight="600">MEMORY.md</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">+ memory/*.md</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">+ shared/*.md</text>
    </g>

    <g transform="translate(12, 220)">
      <rect width="116" height="56" rx="6" fill="#F3E8FD"/>
      <text x="58" y="22" text-anchor="middle" fill="#6F2DA8" font-size="11" font-weight="600">33 Skills</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">wiki · imagen · tts</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">veo · feishu · ...</text>
    </g>

    <g transform="translate(12, 288)">
      <rect width="116" height="56" rx="6" fill="#FCE8E6"/>
      <text x="58" y="22" text-anchor="middle" fill="#C5221F" font-size="11" font-weight="600">MCP Servers</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">github · jina · wiki</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">context7 · chrome</text>
    </g>

    <g transform="translate(12, 356)">
      <rect width="116" height="56" rx="6" fill="#E0F7FA"/>
      <text x="58" y="22" text-anchor="middle" fill="#006064" font-size="11" font-weight="600">Utility Scripts</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">cron · subagent</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">imagen · tts</text>
    </g>

    <g transform="translate(12, 424)">
      <rect width="116" height="60" rx="6" fill="#FFF3E0"/>
      <text x="58" y="22" text-anchor="middle" fill="#E8710A" font-size="11" font-weight="600">Vertex AI</text>
      <text x="58" y="36" text-anchor="middle" fill="#5F6368" font-size="9">Claude · Gemini</text>
      <text x="58" y="48" text-anchor="middle" fill="#5F6368" font-size="9">STT · TTS</text>
    </g>
  </g>

  <!-- Arrows down from channels -->
  <line x1="410" y1="170" x2="410" y2="210" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============== ROW 2: CHANNEL ADAPTER ============== -->
  <g transform="translate(60, 210)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">CHANNEL ADAPTER LAYER</text>
    <rect x="0" y="0" width="700" height="70" rx="8" fill="#FFFFFF" stroke="#DADCE0" filter="url(#card-shadow)"/>

    <g transform="translate(20, 14)">
      <rect width="200" height="42" rx="6" fill="#F8F9FA" stroke="#DADCE0"/>
      <text x="100" y="18" text-anchor="middle" fill="#202124" font-size="11" font-weight="600">UnifiedMessage 转换</text>
      <text x="100" y="32" text-anchor="middle" fill="#5F6368" font-size="9">channel_type · user_id · content</text>
    </g>
    <g transform="translate(240, 14)">
      <rect width="200" height="42" rx="6" fill="#F8F9FA" stroke="#DADCE0"/>
      <text x="100" y="18" text-anchor="middle" fill="#202124" font-size="11" font-weight="600">语音 STT</text>
      <text x="100" y="32" text-anchor="middle" fill="#5F6368" font-size="9">Gemini → Chirp2 → Whisper</text>
    </g>
    <g transform="translate(460, 14)">
      <rect width="220" height="42" rx="6" fill="#F8F9FA" stroke="#DADCE0"/>
      <text x="110" y="18" text-anchor="middle" fill="#202124" font-size="11" font-weight="600">流式渲染 + 急刹车</text>
      <text x="110" y="32" text-anchor="middle" fill="#5F6368" font-size="9">streaming card · stop keywords</text>
    </g>
  </g>

  <line x1="410" y1="280" x2="410" y2="318" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============== ROW 3: BOT CORE ============== -->
  <g transform="translate(60, 318)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">BOT CORE</text>
    <rect x="0" y="0" width="700" height="64" rx="8" fill="#EDE7F6" stroke="#6F2DA8" filter="url(#card-shadow)"/>
    <text x="350" y="24" text-anchor="middle" fill="#6F2DA8" font-size="14" font-weight="600">BotCore (closecrab/core/bot.py)</text>
    <text x="350" y="44" text-anchor="middle" fill="#5F6368" font-size="11">per-user worker · 白名单鉴权 · session 归档 · Firestore 日志 · 控制请求路由</text>
  </g>

  <line x1="410" y1="382" x2="410" y2="420" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============== ROW 4: 4 WORKERS HOT-SWAPPABLE ============== -->
  <g transform="translate(60, 420)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">WORKER LAYER · HOT-SWAPPABLE (15s · zero config)</text>
    <rect x="0" y="0" width="700" height="100" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-dasharray="4,2" filter="url(#card-shadow)"/>

    <g transform="translate(16, 14)">
      <rect width="160" height="72" rx="6" fill="#E8F0FE" stroke="#1A73E8"/>
      <text x="80" y="20" text-anchor="middle" fill="#1A73E8" font-size="12" font-weight="700">ClaudeCodeWorker</text>
      <text x="80" y="36" text-anchor="middle" fill="#5F6368" font-size="9">Unix socketpair</text>
      <text x="80" y="50" text-anchor="middle" fill="#5F6368" font-size="9">stream-JSON · plan mode</text>
      <text x="80" y="64" text-anchor="middle" fill="#5F6368" font-size="9">on_text_chunk streaming</text>
    </g>

    <g transform="translate(186, 14)">
      <rect width="160" height="72" rx="6" fill="#E6F4EA" stroke="#188038"/>
      <text x="80" y="20" text-anchor="middle" fill="#188038" font-size="12" font-weight="700">OpenClawWorker</text>
      <text x="80" y="36" text-anchor="middle" fill="#5F6368" font-size="9">ACP / JSON-RPC</text>
      <text x="80" y="50" text-anchor="middle" fill="#5F6368" font-size="9">external Gateway</text>
      <text x="80" y="64" text-anchor="middle" fill="#5F6368" font-size="9">sqlite memory_search</text>
    </g>

    <g transform="translate(356, 14)">
      <rect width="160" height="72" rx="6" fill="#FEF7E0" stroke="#B06000"/>
      <text x="80" y="20" text-anchor="middle" fill="#B06000" font-size="12" font-weight="700">KiloWorker</text>
      <text x="80" y="36" text-anchor="middle" fill="#5F6368" font-size="9">HTTP SSE</text>
      <text x="80" y="50" text-anchor="middle" fill="#5F6368" font-size="9">part.delta + partial flush</text>
      <text x="80" y="64" text-anchor="middle" fill="#5F6368" font-size="9">~3s cold start</text>
    </g>

    <g transform="translate(526, 14)">
      <rect width="160" height="72" rx="6" fill="#FCE8E6" stroke="#C5221F"/>
      <text x="80" y="20" text-anchor="middle" fill="#C5221F" font-size="12" font-weight="700">GeminiACPWorker</text>
      <text x="80" y="36" text-anchor="middle" fill="#5F6368" font-size="9">ACP / NDJSON</text>
      <text x="80" y="50" text-anchor="middle" fill="#5F6368" font-size="9">Google Search grounding</text>
      <text x="80" y="64" text-anchor="middle" fill="#5F6368" font-size="9">Workspace extensions</text>
    </g>
  </g>

  <line x1="410" y1="520" x2="410" y2="560" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============== ROW 5: AGENT CLI PROCESSES ============== -->
  <g transform="translate(60, 560)">
    <text x="0" y="-6" fill="#5F6368" font-size="10" font-weight="500" letter-spacing="0.8">AGENT CLI PROCESSES</text>
    <rect x="0" y="0" width="700" height="60" rx="8" fill="#F8F9FA" stroke="#DADCE0"/>
    <g transform="translate(16, 14)">
      <rect width="160" height="32" rx="4" fill="#FFFFFF" stroke="#1A73E8"/>
      <text x="80" y="20" text-anchor="middle" fill="#202124" font-size="11" font-weight="500">claude (Node CLI)</text>
    </g>
    <g transform="translate(186, 14)">
      <rect width="160" height="32" rx="4" fill="#FFFFFF" stroke="#188038"/>
      <text x="80" y="20" text-anchor="middle" fill="#202124" font-size="11" font-weight="500">openclaw acp + GW</text>
    </g>
    <g transform="translate(356, 14)">
      <rect width="160" height="32" rx="4" fill="#FFFFFF" stroke="#B06000"/>
      <text x="80" y="20" text-anchor="middle" fill="#202124" font-size="11" font-weight="500">Kilo Cloud (HTTPS)</text>
    </g>
    <g transform="translate(526, 14)">
      <rect width="160" height="32" rx="4" fill="#FFFFFF" stroke="#C5221F"/>
      <text x="80" y="20" text-anchor="middle" fill="#202124" font-size="11" font-weight="500">gemini --acp</text>
    </g>
  </g>

  <!-- ============== VOICE DASHED PATH (right side, from /voice down to Vertex) ============== -->
  <g stroke="#EA4335" stroke-width="1.5" stroke-dasharray="5,3" fill="none">
    <path d="M 680 134 Q 760 134 760 152" marker-end="url(#arrow-voice)"/>
  </g>
  <text x="690" y="124" fill="#EA4335" font-size="9" font-weight="500">voice</text>

  <text x="500" y="670" text-anchor="middle" fill="#9AA0A6" font-size="10">每个 bot 是独立进程 · worker 通过 Firestore worker_type 字段切换 · 切换中保留 memory / identity / team-context</text>
</svg>
