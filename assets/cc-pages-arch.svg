<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="340" rx="12" fill="url(#bg2)"/>
  <text x="450" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">CC Pages Infrastructure</text>

  <!-- Write side -->
  <rect x="30" y="55" width="250" height="260" rx="10" fill="#1a1f2b" stroke="#30363d" stroke-width="1"/>
  <text x="155" y="80" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">WRITE (Bot Machines)</text>

  <rect x="55" y="95" width="200" height="35" rx="6" fill="#161b22" stroke="#10b981" stroke-width="1"/>
  <text x="155" y="117" text-anchor="middle" fill="#7d8590" font-size="10">Jarvis (gLinux)</text>

  <rect x="55" y="140" width="200" height="35" rx="6" fill="#161b22" stroke="#10b981" stroke-width="1"/>
  <text x="155" y="162" text-anchor="middle" fill="#7d8590" font-size="10">Tommy (TPU VM)</text>

  <rect x="55" y="185" width="200" height="35" rx="6" fill="#161b22" stroke="#10b981" stroke-width="1"/>
  <text x="155" y="207" text-anchor="middle" fill="#7d8590" font-size="10">Bunny (B200 VM)</text>

  <text x="155" y="245" text-anchor="middle" fill="#484f58" font-size="9">gcsfuse mount</text>
  <text x="155" y="260" text-anchor="middle" fill="#484f58" font-size="9">$CC_PAGES_WEB_ROOT/</text>

  <rect x="55" y="270" width="200" height="30" rx="4" fill="#0d1117" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="155" y="290" text-anchor="middle" fill="#10b981" font-size="10">gsutil cp → GCS</text>

  <!-- GCS bucket -->
  <g filter="sh2">
    <rect x="320" y="100" width="170" height="120" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="2"/>
    <text x="405" y="130" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">GCS Bucket</text>
    <text x="405" y="152" text-anchor="middle" fill="#7d8590" font-size="9">gs://BUCKET/cc-pages/</text>
    <text x="405" y="172" text-anchor="middle" fill="#484f58" font-size="9">├── pages/*.html</text>
    <text x="405" y="188" text-anchor="middle" fill="#484f58" font-size="9">├── assets/*</text>
    <text x="405" y="204" text-anchor="middle" fill="#484f58" font-size="9">└── 对象存储</text>
  </g>

  <!-- Arrows write → GCS -->
  <line x1="280" y1="160" x2="320" y2="160" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="318,155 328,160 318,165" fill="#10b981"/>

  <!-- Proxy server -->
  <g filter="sh2">
    <rect x="530" y="80" width="150" height="160" rx="10" fill="#1a1f2b" stroke="#a855f7" stroke-width="2"/>
    <text x="605" y="108" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="700">Proxy VM</text>
    <text x="605" y="135" text-anchor="middle" fill="#7d8590" font-size="10">gcsfuse → /gcs</text>
    <rect x="550" y="150" width="110" height="30" rx="4" fill="#161b22" stroke="#a855f7" stroke-width="1"/>
    <text x="605" y="170" text-anchor="middle" fill="#a855f7" font-size="10">nginx</text>
    <text x="605" y="200" text-anchor="middle" fill="#484f58" font-size="9">/pages/* → no-cache</text>
    <text x="605" y="216" text-anchor="middle" fill="#484f58" font-size="9">/assets/* → 7d cache</text>
    <text x="605" y="232" text-anchor="middle" fill="#484f58" font-size="9">security headers</text>
  </g>

  <!-- Arrow GCS → proxy -->
  <line x1="490" y1="160" x2="530" y2="160" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="528,155 538,160 528,165" fill="#f59e0b"/>
  <text x="510" y="150" text-anchor="middle" fill="#484f58" font-size="8">gcsfuse</text>

  <!-- Load Balancer -->
  <g filter="sh2">
    <rect x="720" y="60" width="150" height="200" rx="10" fill="#1a1f2b" stroke="#58a6ff" stroke-width="2"/>
    <text x="795" y="88" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">HTTPS LB</text>
    <text x="795" y="108" text-anchor="middle" fill="#7d8590" font-size="9">SSL + URL Map</text>

    <rect x="740" y="120" width="110" height="40" rx="4" fill="#161b22" stroke="#10b981" stroke-width="1"/>
    <text x="795" y="138" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600">/assets/*</text>
    <text x="795" y="152" text-anchor="middle" fill="#7d8590" font-size="8">Public (no IAP)</text>

    <rect x="740" y="170" width="110" height="40" rx="4" fill="#161b22" stroke="#dc2626" stroke-width="1"/>
    <text x="795" y="188" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">default</text>
    <text x="795" y="202" text-anchor="middle" fill="#7d8590" font-size="8">IAP Protected</text>

    <text x="795" y="235" text-anchor="middle" fill="#484f58" font-size="9">Google Login</text>
    <text x="795" y="250" text-anchor="middle" fill="#484f58" font-size="9">required</text>
  </g>

  <!-- Arrow proxy → LB -->
  <line x1="680" y1="160" x2="720" y2="160" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="718,155 728,160 718,165" fill="#a855f7"/>

  <!-- User access -->
  <g>
    <rect x="740" y="280" width="110" height="40" rx="20" fill="#dc2626" opacity="0.9"/>
    <text x="795" y="305" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Browser</text>
  </g>
  <line x1="795" y1="260" x2="795" y2="280" stroke="#7d8590" stroke-width="1.5"/>
  <polygon points="790,278 795,288 800,278" fill="#7d8590"/>
  <text x="770" y="273" fill="#484f58" font-size="8">HTTPS</text>

  <!-- Footer -->
  <text x="450" y="332" text-anchor="middle" fill="#484f58" font-size="9">All machines write to same GCS bucket • Proxy serves via nginx • LB handles SSL + IAP authentication</text>
</svg>
