server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    if ($request_method !~ ^(GET|HEAD)$ ) {
        return 405;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── GCS-backed static content ──

    # Public assets (OG images for Discord, chart.js, etc.)
    location /assets/ {
        alias /gcs/cc-pages/assets/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Pages (HTML reports) - served behind IAP by LB
    location /pages/ {
        alias /gcs/cc-pages/pages/;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # ── Dashboard 已下线 (2026-03-02) ──
    # 日志功能迁移到 Discord log channel，以下 proxy 不再需要。
    # /g1/api/, /g1/dashboard/, /g1/, /c1/, /c2/ 全部移除。

    # Health check for LB
    location = / {
        return 200 "ok";
    }

    # Default catch-all
    location / {
        return 404;
    }
}
