server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    if ($request_method !~ ^(GET|HEAD)$ ) {
        return 405;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── GCS-backed static content (root: /gcs/cc-pages/) ──

    root /gcs/cc-pages;

    # Public assets (OG images for Discord, chart.js, etc.)
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Pages (HTML reports) - served behind IAP by LB
    location /pages/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Wiki v2 (Quartz static site) - extensionless URLs map to .html
    location /wiki-v2/ {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    # All other GCS content (controlboard, ss, tensorboard, etc.)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Health check for LB
    location = / {
        return 200 "ok";
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
